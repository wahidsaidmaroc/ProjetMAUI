name: Deploy the OrderManagement API to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  API_PROJECT: '001 Module/OrderManagementSolution/BackEnd/OrderManagement.API/OrderManagement.API.csproj'
  TEST_PROJECT: '001 Module/OrderManagementSolution/Teste/BackEnd/OrderManagement.Application.Test/OrderManagement.Application.Test.csproj'
  SOLUTION_FILE: '001 Module/OrderManagementSolution/OrderManagementSolution.slnx'
  PUBLISH_DIR: '${{ github.workspace }}/publish'
  AZURE_WEBAPP_NAME: 'YOUR_APP_SERVICE_NAME'

jobs:
  restore:
    name: Restore dependencies
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution packages
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

  build:
    name: Build API
    runs-on: windows-latest
    needs: restore

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API project
        run: dotnet restore "${{ env.API_PROJECT }}"

      - name: Build API project
        run: dotnet build "${{ env.API_PROJECT }}" --configuration Release --no-restore

  test:
    name: Run backend tests
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore test project
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Run tests
        run: dotnet test "${{ env.TEST_PROJECT }}" --configuration Release --no-restore --no-build

  deploy:
    name: Publish and deploy to Azure App Service
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API project
        run: dotnet restore "${{ env.API_PROJECT }}"

      - name: Publish API
        # Le dossier publish contient le site compilé à envoyer vers Azure.
        run: dotnet publish "${{ env.API_PROJECT }}" --configuration Release --no-restore --output "${{ env.PUBLISH_DIR }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          # Secret GitHub attendu: AZURE_WEBAPP_PUBLISH_PROFILE.
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

