name: Backend CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-test-publish:
    runs-on: windows-latest

    env:
      BUILD_CONFIGURATION: Release
      BACKEND_API_PROJECT: '001 Module/OrderManagementSolution/BackEnd/OrderManagement.API/OrderManagement.API.csproj'
      BACKEND_TEST_PROJECT: '001 Module/OrderManagementSolution/Teste/BackEnd/OrderManagement.Application.Test/OrderManagement.Application.Test.csproj'
      PUBLISH_DIR: ${{ github.workspace }}/publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend API
        run: dotnet restore "${{ env.BACKEND_API_PROJECT }}"

      - name: Restore backend tests
        run: dotnet restore "${{ env.BACKEND_TEST_PROJECT }}"

      - name: Build backend API
        run: dotnet build "${{ env.BACKEND_API_PROJECT }}" --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run backend tests
        run: >
          dotnet test "${{ env.BACKEND_TEST_PROJECT }}"
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-restore
          --logger trx
          --results-directory ${{ runner.temp }}/TestResults
          --collect "XPlat Code Coverage"

      - name: Publish backend API
        run: dotnet publish "${{ env.BACKEND_API_PROJECT }}" --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --output "${{ env.PUBLISH_DIR }}"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: drop
          path: ${{ env.PUBLISH_DIR }}